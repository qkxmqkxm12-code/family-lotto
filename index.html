<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가족방 로또 이벤트</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,'Noto Sans KR',sans-serif;
  background:linear-gradient(135deg,#111827,#312e81);
  color:#fff;
  padding:18px;
  min-height:100vh;
}
.container{
  max-width:620px;
  margin:0 auto;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.16);
  border-radius:22px;
  padding:22px;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
}
h1{text-align:center;margin:0 0 10px;font-size:28px}
p{color:#d1d5db;line-height:1.5;text-align:center}
.notice{
  background:rgba(0,0,0,.25);
  border-radius:15px;
  padding:15px;
  margin:16px 0;
  line-height:1.6;
}
input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:13px;
  margin:12px 0;
  font-size:16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:9px;
  margin-top:12px;
}
.number{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  padding:12px 0;
  text-align:center;
  border-radius:999px;
  cursor:pointer;
  font-weight:900;
  user-select:none;
}
.selected{
  background:#facc15;
  color:#111827;
  border-color:#facc15;
}
.selected-box{
  margin:14px 0;
  color:#facc15;
  font-weight:bold;
}
button{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:14px;
  background:#facc15;
  color:#111827;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}
.message{
  margin-top:18px;
  background:rgba(0,0,0,.28);
  border-radius:14px;
  padding:15px;
  white-space:pre-wrap;
  line-height:1.5;
  display:none;
}
.small{
  font-size:13px;
  color:#cbd5e1;
  text-align:left;
}
@media(max-width:520px){
  body{padding:10px}
  .container{padding:16px;border-radius:16px}
  h1{font-size:24px}
  .number{font-size:14px;padding:10px 0}
}
</style>
</head>

<body>

<div class="container">
  <h1>🎉 가족방 로또 이벤트</h1>
  <p>닉네임을 입력하고 1~45번 중 원하는 번호 6개를 선택해주세요.</p>

  <div class="notice">
    🎁 당첨 혜택<br>
    3개 적중 : 커피 기프티콘<br>
    4개 적중 : 치킨 기프티콘<br>
    5개 적중 : 배민 상품권 3만원<br>
    6개 적중 : 신세계 상품권 10만원
  </div>

  <input type="text" id="nickname" placeholder="닉네임 입력">

  <div class="small">선택한 번호</div>
  <div class="selected-box" id="selectedText">없음</div>

  <div class="grid" id="numbers"></div>

  <button onclick="submitLotto()">참여하기</button>

  <div class="message" id="message"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkRvFF3UT31Jjv8DxiDWDAp76SDkV-Mi0",
  authDomain: "family-lotto-26dc4.firebaseapp.com",
  projectId: "family-lotto-26dc4",
  storageBucket: "family-lotto-26dc4.firebasestorage.app",
  messagingSenderId: "870924884772",
  appId: "1:870924884772:web:d1d6019fcd2f6368d3b1b1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selected = [];
const grid = document.getElementById("numbers");
const selectedText = document.getElementById("selectedText");
const message = document.getElementById("message");

for(let i=1; i<=45; i++){
  const div = document.createElement("div");
  div.className = "number";
  div.innerText = i;

  div.onclick = () => {
    if(selected.includes(i)){
      selected = selected.filter(n => n !== i);
      div.classList.remove("selected");
    }else{
      if(selected.length >= 6){
        showMessage("번호는 6개까지만 선택 가능합니다.");
        return;
      }
      selected.push(i);
      div.classList.add("selected");
    }

    selected.sort((a,b)=>a-b);
    selectedText.innerText = selected.length ? selected.join(", ") : "없음";
  };

  grid.appendChild(div);
}

window.submitLotto = async function(){
  const nickname = document.getElementById("nickname").value.trim();

  if(!nickname){
    showMessage("닉네임을 입력해주세요.");
    return;
  }

  if(selected.length !== 6){
    showMessage("번호 6개를 선택해주세요.");
    return;
  }

  try{
    showMessage("참여 정보를 저장하는 중입니다...");

    const q = query(collection(db, "entries"), where("nickname", "==", nickname));
    const snap = await getDocs(q);

    if(!snap.empty){
      showMessage("이미 참여한 닉네임입니다.\n1인 1회만 참여 가능합니다.");
      return;
    }

    await addDoc(collection(db, "entries"), {
      nickname: nickname,
      numbers: selected,
      createdAt: serverTimestamp()
    });

    showMessage(
      "참여 완료!\n\n" +
      "닉네임: " + nickname + "\n" +
      "선택번호: " + selected.join(", ") + "\n\n" +
      "추첨 결과는 가족방 공지를 통해 확인해주세요."
    );

    document.querySelector("button").disabled = true;
    document.querySelector("button").innerText = "참여 완료";

  }catch(error){
    console.error(error);
    showMessage("오류가 발생했습니다.\n잠시 후 다시 시도해주세요.");
  }
}

function showMessage(text){
  message.style.display = "block";
  message.innerText = text;
}
</script>

</body>
</html>
