<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가족방 로또 이벤트</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,'Noto Sans KR',sans-serif;
  color:#fff;
  padding:18px;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 18%, rgba(250,204,21,.45), transparent 16%),
    radial-gradient(circle at 82% 22%, rgba(255,255,255,.16), transparent 12%),
    radial-gradient(circle at 70% 78%, rgba(245,158,11,.36), transparent 18%),
    radial-gradient(circle at 25% 82%, rgba(234,179,8,.22), transparent 14%),
    linear-gradient(135deg,#050505 0%,#111827 45%,#1f2937 100%);
  overflow-x:hidden;
}

body::before{
  content:"07  12  21  33  41     03  18  24  32  45     LOTTO     06  11  29  38";
  position:fixed;
  inset:0;
  pointer-events:none;
  color:rgba(250,204,21,.08);
  font-size:64px;
  font-weight:900;
  letter-spacing:10px;
  line-height:1.8;
  transform:rotate(-18deg) scale(1.2);
  white-space:pre-wrap;
  opacity:.75;
}

.container{
  position:relative;
  z-index:1;
  max-width:660px;
  margin:0 auto;
  background:rgba(10,15,25,.88);
  border:1px solid rgba(250,204,21,.28);
  border-radius:28px;
  padding:26px;
  box-shadow:0 30px 90px rgba(0,0,0,.58),0 0 55px rgba(250,204,21,.15);
  backdrop-filter:blur(20px);
}

.logo-balls{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:14px;
}

.logo-ball,.number,.selected-mini{
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#111827;
  font-weight:900;
  box-shadow:inset -6px -7px 9px rgba(0,0,0,.28),0 5px 14px rgba(0,0,0,.3);
}

.logo-ball{
  width:40px;
  height:40px;
  font-size:14px;
}

h1{
  text-align:center;
  margin:0 0 10px;
  font-size:32px;
  letter-spacing:-1px;
}

p{
  color:#d1d5db;
  line-height:1.5;
  text-align:center;
  margin-top:0;
}

.counter{
  margin:16px 0;
  padding:14px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(245,158,11,.08));
  border:1px solid rgba(250,204,21,.32);
  text-align:center;
  font-weight:900;
  color:#fde047;
}

.benefit-wrap{
  margin:20px 0;
}

.benefit-title{
  font-size:20px;
  font-weight:900;
  color:#fde047;
  margin-bottom:12px;
  text-align:center;
}

.benefit-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.benefit-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:13px 15px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(2,6,23,.95),rgba(30,41,59,.8));
  border:1px solid rgba(250,204,21,.22);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 20px rgba(0,0,0,.18);
}

.benefit-card strong{
  color:#fde047;
}

.benefit-card span{
  color:#fff;
  font-weight:800;
}

.recent{
  margin:18px 0;
  padding:14px;
  border-radius:18px;
  background:rgba(15,23,42,.78);
  border:1px solid rgba(255,255,255,.1);
}

.recent-title{
  font-weight:900;
  color:#93c5fd;
  margin-bottom:8px;
}

.recent-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  color:#e5e7eb;
  font-size:14px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  margin:12px 0;
  font-size:16px;
  background:rgba(255,255,255,.96);
  color:#111827;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:14px;
  justify-items:center;
}

.number{
  width:54px;
  height:54px;
  cursor:pointer;
  font-size:16px;
  user-select:none;
  transition:.18s cubic-bezier(.2,.9,.2,1.4);
  border:2px solid rgba(255,255,255,.35);
}

.number:hover{
  transform:translateY(-3px) scale(1.05);
}

.selected{
  outline:4px solid #fff;
  transform:translateY(-8px) scale(1.12);
  animation:bounceBall .35s ease;
  box-shadow:0 0 0 5px rgba(250,204,21,.45),0 14px 30px rgba(250,204,21,.35);
}

@keyframes bounceBall{
  0%{transform:translateY(0) scale(1)}
  55%{transform:translateY(-12px) scale(1.14)}
  100%{transform:translateY(-8px) scale(1.12)}
}

.yellow{background:#fbc400}
.blue{background:#69c8f2}
.red{background:#ff7272}
.gray{background:#b7b7b7}
.green{background:#b0d840}

.selected-box{
  margin:14px 0;
  min-height:48px;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  align-items:center;
}

.selected-mini{
  width:38px;
  height:38px;
  font-size:13px;
}

button{
  width:100%;
  padding:17px;
  margin-top:22px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#fde047,#f59e0b);
  color:#111827;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(250,204,21,.3);
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.05);
}

button:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.message{
  margin-top:18px;
  background:rgba(2,6,23,.82);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:17px;
  white-space:pre-wrap;
  line-height:1.6;
  display:none;
}

.success{
  animation:successPop .65s ease;
  border-color:rgba(34,197,94,.6);
  box-shadow:0 0 25px rgba(34,197,94,.25);
}

@keyframes successPop{
  0%{transform:scale(.92);opacity:.4}
  55%{transform:scale(1.04);opacity:1}
  100%{transform:scale(1)}
}

.confetti{
  position:fixed;
  top:-20px;
  width:10px;
  height:16px;
  background:#facc15;
  z-index:999;
  animation:fall 1.8s linear forwards;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0}
}

.small{
  font-size:13px;
  color:#cbd5e1;
  text-align:left;
}

@media(max-width:520px){
  body{padding:10px}
  body::before{font-size:42px;letter-spacing:6px;transform:rotate(-18deg) scale(1.15)}
  .container{padding:18px;border-radius:20px}
  h1{font-size:25px}
  .grid{gap:9px}
  .number{width:48px;height:48px;font-size:14px}
}
</style>
</head>

<body>

<div class="container" id="container">
  <div class="logo-balls">
    <div class="logo-ball yellow">7</div>
    <div class="logo-ball blue">12</div>
    <div class="logo-ball red">21</div>
    <div class="logo-ball gray">33</div>
    <div class="logo-ball green">45</div>
  </div>

  <h1>🎉 가족방 로또 이벤트</h1>
  <p>닉네임을 입력하고 1~45번 중 원하는 번호 6개를 선택해주세요.</p>

  <div class="counter" id="counter">남은 참여자 수 확인 중...</div>

  <div class="benefit-wrap">
    <div class="benefit-title">🎁 당첨 혜택</div>
    <div class="benefit-grid">
      <div class="benefit-card"><strong>2개 적중</strong><span>가족방 포인트 1만원</span></div>
      <div class="benefit-card"><strong>3개 적중</strong><span>커피 기프티콘</span></div>
      <div class="benefit-card"><strong>4개 적중</strong><span>치킨 기프티콘</span></div>
      <div class="benefit-card"><strong>5개 적중</strong><span>배민 상품권 3만원</span></div>
      <div class="benefit-card"><strong>6개 적중</strong><span>신세계 상품권 10만원</span></div>
    </div>
  </div>

  <div class="recent">
    <div class="recent-title">최근 참여자</div>
    <div class="recent-list" id="recentList">최근 참여자를 불러오는 중...</div>
  </div>

  <input type="text" id="nickname" placeholder="닉네임 입력">

  <div class="small">선택한 번호</div>
  <div class="selected-box" id="selectedText">없음</div>

  <div class="grid" id="numbers"></div>

  <button id="submitBtn" onclick="submitLotto()">참여하기</button>

  <div class="message" id="message"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  orderBy,
  limit,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkRvFF3UT31Jjv8DxiDWDAp76SDkV-Mi0",
  authDomain: "family-lotto-26dc4.firebaseapp.com",
  projectId: "family-lotto-26dc4",
  storageBucket: "family-lotto-26dc4.firebasestorage.app",
  messagingSenderId: "870924884772",
  appId: "1:870924884772:web:d1d6019fcd2f6368d3b1b1"
};

const MAX_PARTICIPANTS = 100;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selected = [];
const grid = document.getElementById("numbers");
const selectedText = document.getElementById("selectedText");
const message = document.getElementById("message");
const counter = document.getElementById("counter");
const submitBtn = document.getElementById("submitBtn");
const container = document.getElementById("container");
const recentList = document.getElementById("recentList");

function numberClass(num){
  if(num <= 10) return "yellow";
  if(num <= 20) return "blue";
  if(num <= 30) return "red";
  if(num <= 40) return "gray";
  return "green";
}

function maskName(name){
  if(!name) return "*";
  if(name.length === 1) return name + "*";
  if(name.length === 2) return name[0] + "*";
  return name[0] + "*".repeat(name.length - 2) + name[name.length - 1];
}

function renderSelected(){
  if(!selected.length){
    selectedText.innerHTML = "없음";
    return;
  }

  selectedText.innerHTML = "";
  selected.forEach(num=>{
    const b = document.createElement("div");
    b.className = "selected-mini " + numberClass(num);
    b.innerText = num;
    selectedText.appendChild(b);
  });
}

async function updateCounter(){
  try{
    const snap = await getDocs(collection(db, "entries"));
    const joined = snap.size;
    const remain = Math.max(MAX_PARTICIPANTS - joined, 0);

    counter.innerText = "남은 참여자 수 : " + remain + "명 / 총 " + MAX_PARTICIPANTS + "명";

    if(remain <= 0){
      submitBtn.disabled = true;
      submitBtn.innerText = "참여 마감";
    }
  }catch(error){
    counter.innerText = "남은 참여자 수를 불러오는 중 오류가 발생했습니다.";
  }
}

async function updateRecent(){
  try{
    const q = query(collection(db, "entries"), orderBy("createdAt", "desc"), limit(5));
    const snap = await getDocs(q);

    if(snap.empty){
      recentList.innerText = "아직 참여자가 없습니다.";
      return;
    }

    recentList.innerHTML = "";
    snap.forEach(doc=>{
      const data = doc.data();
      const div = document.createElement("div");
      div.innerText = "• " + maskName(data.nickname) + "님 참여 완료";
      recentList.appendChild(div);
    });
  }catch(error){
    recentList.innerText = "최근 참여자를 불러오는 중입니다.";
  }
}

for(let i=1; i<=45; i++){
  const div = document.createElement("div");
  div.className = "number " + numberClass(i);
  div.innerText = i;

  div.onclick = () => {
    if(selected.includes(i)){
      selected = selected.filter(n => n !== i);
      div.classList.remove("selected");
    }else{
      if(selected.length >= 6){
        showMessage("번호는 6개까지만 선택 가능합니다.");
        return;
      }
      selected.push(i);
      div.classList.add("selected");
    }

    selected.sort((a,b)=>a-b);
    renderSelected();
  };

  grid.appendChild(div);
}

window.submitLotto = async function(){
  const nickname = document.getElementById("nickname").value.trim();

  if(!nickname){
    showMessage("닉네임을 입력해주세요.");
    return;
  }

  if(selected.length !== 6){
    showMessage("번호 6개를 선택해주세요.");
    return;
  }

  try{
    showMessage("참여 정보를 저장하는 중입니다...");

    const allSnap = await getDocs(collection(db, "entries"));
    if(allSnap.size >= MAX_PARTICIPANTS){
      showMessage("참여 인원이 마감되었습니다.");
      submitBtn.disabled = true;
      submitBtn.innerText = "참여 마감";
      return;
    }

    const q = query(collection(db, "entries"), where("nickname", "==", nickname));
    const snap = await getDocs(q);

    if(!snap.empty){
      showMessage("이미 참여한 닉네임입니다.\\n1인 1회만 참여 가능합니다.");
      return;
    }

    await addDoc(collection(db, "entries"), {
      nickname: nickname,
      numbers: selected,
      createdAt: serverTimestamp()
    });

    showMessage(
      "🎉 참여 완료!\\n\\n" +
      "닉네임: " + nickname + "\\n" +
      "선택번호: " + selected.join(", ") + "\\n\\n" +
      "추첨 결과는 가족방 공지를 통해 확인해주세요."
    );

    successEffect();
    await updateCounter();
    await updateRecent();

    submitBtn.disabled = true;
    submitBtn.innerText = "참여 완료";

  }catch(error){
    console.error(error);
    showMessage("오류가 발생했습니다.\\n잠시 후 다시 시도해주세요.");
  }
}

function showMessage(text){
  message.style.display = "block";
  message.innerText = text;
}

function successEffect(){
  container.classList.add("success");
  setTimeout(()=>container.classList.remove("success"), 900);

  for(let i=0; i<35; i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["#facc15","#38bdf8","#fb7185","#a3e635","#ffffff"][Math.floor(Math.random()*5)];
    c.style.animationDelay = Math.random() * .35 + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2100);
  }
}

updateCounter();
updateRecent();
</script>

</body>
</html>
