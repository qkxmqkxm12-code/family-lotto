<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가족방 로또 이벤트</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#1f2937;
padding:20px;
border-radius:15px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.number{
background:#374151;
padding:12px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.selected{
background:#facc15;
color:black;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#facc15;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h1>🎉 가족방 로또 이벤트</h1>

<input type="text" id="nickname" placeholder="닉네임 입력">

<h3>번호 6개 선택</h3>

<div class="grid" id="numbers"></div>

<button onclick="submitLotto()">참여하기</button>

</div>

<script>

let selected=[];

const grid=document.getElementById("numbers");

for(let i=1;i<=45;i++){

const div=document.createElement("div");

div.className="number";

div.innerText=i;

div.onclick=()=>{

if(selected.includes(i)){

selected=selected.filter(n=>n!==i);
div.classList.remove("selected");

}else{

if(selected.length>=6){
alert("번호는 6개만 선택 가능합니다.");
return;
}

selected.push(i);
div.classList.add("selected");

}

};

grid.appendChild(div);

}

function submitLotto(){

const nickname=document.getElementById("nickname").value;

if(!nickname){
alert("닉네임 입력");
return;
}

if(selected.length!==6){
alert("번호 6개 선택");
return;
}

alert(
"닉네임 : "+nickname+
"\n번호 : "+selected.sort((a,b)=>a-b).join(", ")
);

}

</script>

</body>
</html>
