<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로또 페이지</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,'Noto Sans KR',sans-serif;
  color:#fff;
  padding:18px;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 18%, rgba(250,204,21,.45), transparent 16%),
    radial-gradient(circle at 82% 22%, rgba(255,255,255,.16), transparent 12%),
    radial-gradient(circle at 70% 78%, rgba(245,158,11,.36), transparent 18%),
    radial-gradient(circle at 25% 82%, rgba(234,179,8,.22), transparent 14%),
    linear-gradient(135deg,#050505 0%,#111827 45%,#1f2937 100%);
  overflow-x:hidden;
}

body::before{
  content:"07  12  21  33  41     03  18  24  32  45     LOTTO     06  11  29  38";
  position:fixed;
  inset:0;
  pointer-events:none;
  color:rgba(250,204,21,.08);
  font-size:64px;
  font-weight:900;
  letter-spacing:10px;
  line-height:1.8;
  transform:rotate(-18deg) scale(1.2);
  white-space:pre-wrap;
  opacity:.75;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 30%),
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,.06) 45%, transparent 70%);
}

.container{
  position:relative;
  z-index:1;
  max-width:920px;
  margin:auto;
  background:rgba(10,15,25,.86);
  padding:26px;
  border-radius:28px;
  border:1px solid rgba(250,204,21,.28);
  box-shadow:
    0 30px 90px rgba(0,0,0,.58),
    0 0 55px rgba(250,204,21,.15),
    inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
}

h1{
  text-align:center;
  font-size:32px;
  letter-spacing:-1px;
  margin:5px 0 25px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  margin:8px 0;
  font-size:16px;
  background:rgba(255,255,255,.96);
  color:#111827;
  outline:none;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  margin-top:12px;
  background:linear-gradient(135deg,#fde047,#f59e0b);
  color:#111827;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 10px 28px rgba(250,204,21,.3);
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.05);
}

.danger{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:#fff;
  box-shadow:0 10px 28px rgba(239,68,68,.28);
}

.box{
  background:rgba(2,6,23,.82);
  padding:17px;
  border-radius:18px;
  margin-top:17px;
  white-space:pre-wrap;
  line-height:1.6;
  border:1px solid rgba(255,255,255,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
  background:rgba(2,6,23,.45);
  border-radius:18px;
  overflow:hidden;
}

th,td{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:12px;
  text-align:left;
}

th{
  color:#facc15;
  background:rgba(250,204,21,.08);
}

.hidden{display:none}

@media(max-width:520px){
  body{padding:10px}

  body::before{
    font-size:42px;
    letter-spacing:6px;
    transform:rotate(-18deg) scale(1.15);
  }

  .container{
    padding:18px;
    border-radius:20px;
  }

  h1{font-size:25px}
  th,td{font-size:13px;padding:9px}
}
</style>
</head>

<body>

<div class="container">
  <h1>관리자 로또 페이지</h1>

  <input type="password" id="password" placeholder="관리자 비밀번호">
  <button onclick="login()">관리자 접속</button>

  <div id="adminArea" class="hidden">
    <button onclick="loadEntries()">참여자 불러오기</button>

    <input id="winningNumbers" placeholder="당첨번호 6개 입력 예: 3,11,18,24,32,41">
    <button onclick="checkWinners()">당첨자 확인</button>

    <button class="danger" onclick="resetRound()">회차 종료 및 초기화</button>

    <div id="summary" class="box"></div>
    <div id="notice" class="box"></div>
    <div id="tableArea"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const ADMIN_PASSWORD = "qoxmf123!@";

const firebaseConfig = {
  apiKey: "AIzaSyCkRvFF3UT31Jjv8DxiDWDAp76SDkV-Mi0",
  authDomain: "family-lotto-26dc4.firebaseapp.com",
  projectId: "family-lotto-26dc4",
  storageBucket: "family-lotto-26dc4.firebasestorage.app",
  messagingSenderId: "870924884772",
  appId: "1:870924884772:web:d1d6019fcd2f6368d3b1b1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let entries = [];

window.login = function(){
  const pw = document.getElementById("password").value;

  if(pw !== ADMIN_PASSWORD){
    alert("비밀번호가 틀렸습니다.");
    return;
  }

  document.getElementById("adminArea").classList.remove("hidden");
  alert("관리자 접속 완료");
};

window.loadEntries = async function(){
  const tableArea = document.getElementById("tableArea");
  const summary = document.getElementById("summary");

  summary.innerText = "참여자 불러오는 중...";

  const q = query(collection(db, "entries"), orderBy("createdAt", "asc"));
  const snap = await getDocs(q);

  entries = [];

  snap.forEach(docSnap => {
    const data = docSnap.data();
    entries.push({
      nickname: data.nickname,
      numbers: data.numbers || []
    });
  });

  summary.innerText = "총 참여자: " + entries.length + "명";

  let html = "<table><tr><th>순번</th><th>닉네임</th><th>선택번호</th></tr>";

  entries.forEach((e, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${e.nickname}</td>
      <td>${e.numbers.join(", ")}</td>
    </tr>`;
  });

  html += "</table>";
  tableArea.innerHTML = html;
};

window.checkWinners = function(){
  if(entries.length === 0){
    alert("먼저 참여자를 불러오세요.");
    return;
  }

  const raw = document.getElementById("winningNumbers").value.trim();

  if(!raw){
    alert("당첨번호를 입력하세요.");
    return;
  }

  const winning = raw.split(/[,\s]+/).map(Number).filter(Boolean).sort((a,b)=>a-b);
  const unique = [...new Set(winning)];

  if(unique.length !== 6 || unique.some(n => n < 1 || n > 45)){
    alert("1~45번 중 중복 없이 6개 입력하세요.");
    return;
  }

  const results = entries.map(e => {
    const hit = e.numbers.filter(n => unique.includes(n)).length;

    let prize = "꽝";
    if(hit === 2) prize = "가족방 포인트 2만원";
    if(hit === 3) prize = "커피 기프티콘";
    if(hit === 4) prize = "치킨 기프티콘";
    if(hit === 5) prize = "배민 상품권 3만원";
    if(hit === 6) prize = "신세계 상품권 10만원";

    return {
      nickname: e.nickname,
      numbers: e.numbers,
      hit,
      prize
    };
  }).sort((a,b)=>b.hit-a.hit);

  const winners = results.filter(r => r.hit >= 2);

  let noticeText = "🎉 가족방 로또 이벤트 당첨 결과 🎉\n\n";
  noticeText += "✅ 당첨번호: " + unique.join(", ") + "\n";
  noticeText += "✅ 총 참여자: " + entries.length + "명\n\n";

  if(winners.length === 0){
    noticeText += "아쉽게도 이번 회차 당첨자는 없습니다.\n다음 이벤트에도 많은 참여 부탁드립니다!";
  }else{
    noticeText += "🏆 당첨자 명단\n";
    winners.forEach(w => {
      noticeText += `- ${w.nickname} / ${w.hit}개 적중 / ${w.prize}\n`;
    });
    noticeText += "\n당첨되신 회원님은 담당 실장에게 확인 요청 부탁드립니다.";
  }

  document.getElementById("notice").innerText = noticeText;

  let html = "<table><tr><th>닉네임</th><th>선택번호</th><th>적중</th><th>상품</th></tr>";

  results.forEach(r => {
    html += `<tr>
      <td>${r.nickname}</td>
      <td>${r.numbers.join(", ")}</td>
      <td>${r.hit}개</td>
      <td>${r.prize}</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("tableArea").innerHTML = html;
};

window.resetRound = async function(){
  const ok = confirm("정말 이번 회차를 종료하고 모든 참여자를 삭제하시겠습니까?");

  if(!ok) return;

  const finalOk = confirm("삭제 후 복구할 수 없습니다. 진짜 초기화할까요?");
  if(!finalOk) return;

  const summary = document.getElementById("summary");
  const notice = document.getElementById("notice");
  const tableArea = document.getElementById("tableArea");

  summary.innerText = "회차 종료 처리 중...";

  const snap = await getDocs(collection(db, "entries"));

  for(const d of snap.docs){
    await deleteDoc(doc(db, "entries", d.id));
  }

  entries = [];
  document.getElementById("winningNumbers").value = "";
  summary.innerText = "총 참여자: 0명";
  notice.innerText = "회차 종료 및 초기화 완료";
  tableArea.innerHTML = "";

  alert("회차 종료 및 초기화 완료");
};
</script>

</body>
</html>
