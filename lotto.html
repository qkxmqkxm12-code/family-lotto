<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 로또 추첨기</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#1b2a4a,#050711 70%);
  font-family:Arial,'Noto Sans KR',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
.wrap{
  width:100%;
  max-width:430px;
  padding:20px;
  text-align:center;
}
h1{
  margin:10px 0;
  font-size:30px;
  color:#ffd54a;
}
.machine{
  position:relative;
  margin:25px auto;
  width:310px;
  height:310px;
  border:8px solid #ffd54a;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  box-shadow:0 0 35px rgba(255,213,74,.4);
}
.ball{
  position:absolute;
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:#111;
  box-shadow:inset -4px -5px 8px rgba(0,0,0,.25);
}
.spin .ball{
  animation:shake .35s infinite alternate;
}
@keyframes shake{
  from{transform:translate(-8px,6px) rotate(0deg)}
  to{transform:translate(10px,-8px) rotate(360deg)}
}
.result{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  min-height:60px;
  margin-top:20px;
}
.pick{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:18px;
  color:#111;
  animation:pop .35s ease;
}
.bonusBox{
  margin-top:15px;
  font-size:18px;
}
@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ffd54a,#ff8c00);
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  opacity:.6;
}
.notice{
  margin-top:15px;
  font-size:13px;
  color:#ccc;
}
</style>
</head>
<body>

<div class="wrap">
  <h1>🎰 가상 로또 추첨기</h1>
  <p>START 버튼을 누르면 로또 번호가 추첨됩니다.</p>

  <div class="machine" id="machine"></div>

  <button id="startBtn" onclick="startLotto()">추첨 시작</button>

  <div class="result" id="result"></div>
  <div class="bonusBox" id="bonus"></div>

  <div class="notice">※ 본 페이지는 이벤트용 가상 추첨 페이지입니다.</div>
</div>

<script>
const machine = document.getElementById("machine");
const result = document.getElementById("result");
const bonus = document.getElementById("bonus");
const startBtn = document.getElementById("startBtn");

function ballColor(num){
  if(num <= 10) return "#fbc400";
  if(num <= 20) return "#69c8f2";
  if(num <= 30) return "#ff7272";
  if(num <= 40) return "#aaa";
  return "#b0d840";
}

function createBalls(){
  machine.innerHTML = "";
  for(let i=1; i<=45; i++){
    const b = document.createElement("div");
    b.className = "ball";
    b.innerText = i;
    b.style.background = ballColor(i);
    b.style.left = Math.random() * 250 + "px";
    b.style.top = Math.random() * 250 + "px";
    b.style.animationDelay = Math.random() + "s";
    machine.appendChild(b);
  }
}

function drawNumbers(){
  let nums = [];
  while(nums.length < 7){
    let n = Math.floor(Math.random() * 45) + 1;
    if(!nums.includes(n)) nums.push(n);
  }
  return {
    main: nums.slice(0,6).sort((a,b)=>a-b),
    bonus: nums[6]
  };
}

function showBall(num, target){
  const div = document.createElement("div");
  div.className = "pick";
  div.innerText = num;
  div.style.background = ballColor(num);
  target.appendChild(div);
}

async function startLotto(){
  startBtn.disabled = true;
  result.innerHTML = "";
  bonus.innerHTML = "";
  machine.classList.add("spin");

  const picked = drawNumbers();

  for(let i=0; i<picked.main.length; i++){
    await new Promise(r => setTimeout(r, 900));
    showBall(picked.main[i], result);
  }

  await new Promise(r => setTimeout(r, 900));
  bonus.innerHTML = "보너스 번호 ";
  showBall(picked.bonus, bonus);

  machine.classList.remove("spin");
  startBtn.disabled = false;
}

createBalls();
</script>

</body>
</html>
