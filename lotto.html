<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 추첨기</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#243b78 0%,#081126 45%,#03050c 100%);
  font-family:Arial,'Noto Sans KR',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.wrap{
  width:100%;
  max-width:430px;
  padding:18px;
  text-align:center;
}

h1{
  margin:8px 0 6px;
  font-size:32px;
  color:#ffd84d;
  text-shadow:0 3px 10px rgba(0,0,0,.5);
}

.desc{
  font-size:14px;
  color:#ddd;
  margin-bottom:10px;
}

.stage{
  position:relative;
  height:535px;
  overflow:hidden;
}

.machine{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  height:320px;
  border:9px solid #ffd84d;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,.45),transparent 17%),
    radial-gradient(circle at center,rgba(255,255,255,.13),rgba(255,255,255,.04));
  box-shadow:
    0 0 38px rgba(255,216,77,.4),
    inset 0 0 35px rgba(255,255,255,.16);
  overflow:hidden;
}

.machine::before{
  content:"";
  position:absolute;
  inset:22px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.16);
  z-index:2;
}

.machine::after{
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  top:35px;
  left:55px;
  border-radius:50%;
  background:rgba(255,255,255,.13);
  filter:blur(2px);
}

.miniBall{
  position:absolute;
  width:36px;
  height:36px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:900;
  font-size:13px;
  color:#111;
  box-shadow:
    inset -5px -6px 8px rgba(0,0,0,.3),
    0 3px 7px rgba(0,0,0,.35);
  transition:.055s linear;
}

.exit{
  position:absolute;
  top:252px;
  left:50%;
  transform:translateX(83px);
  width:82px;
  height:46px;
  background:linear-gradient(180deg,#ffe66b,#e88e00);
  border-radius:0 25px 25px 0;
  z-index:6;
  box-shadow:0 5px 14px rgba(0,0,0,.45);
}

.exit::after{
  content:"";
  position:absolute;
  right:8px;
  top:14px;
  width:20px;
  height:18px;
  border-radius:50%;
  background:#111827;
}

.rail{
  position:absolute;
  top:337px;
  left:50%;
  transform:translateX(-8px) rotate(23deg);
  width:240px;
  height:19px;
  background:linear-gradient(180deg,#eee,#777);
  border-radius:20px;
  box-shadow:0 6px 14px rgba(0,0,0,.45);
}

.rail::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:-10px;
  height:4px;
  background:rgba(255,255,255,.35);
  border-radius:10px;
}

.dropBall{
  position:absolute;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:19px;
  font-weight:900;
  color:#111;
  z-index:30;
  box-shadow:
    inset -6px -7px 9px rgba(0,0,0,.3),
    0 5px 14px rgba(0,0,0,.5);
  animation:dropRail 1.15s ease-in-out forwards;
}

@keyframes dropRail{
  0%{left:287px;top:249px;transform:scale(.65) rotate(0deg)}
  25%{left:320px;top:295px;transform:scale(1) rotate(160deg)}
  60%{left:255px;top:372px;transform:rotate(460deg)}
  100%{left:63px;top:438px;transform:rotate(760deg)}
}

.resultTitle{
  position:absolute;
  left:0;
  right:0;
  bottom:82px;
  font-size:17px;
  font-weight:900;
  color:#ffd84d;
}

.result{
  position:absolute;
  left:0;
  right:0;
  bottom:18px;
  min-height:58px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:7px;
  flex-wrap:wrap;
}

.pick{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:900;
  color:#111;
  font-size:18px;
  box-shadow:
    inset -5px -6px 8px rgba(0,0,0,.26),
    0 4px 10px rgba(0,0,0,.4);
  animation:pop .28s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  70%{transform:scale(1.15)}
  100%{transform:scale(1)}
}

.bonusBox{
  margin-top:10px;
  min-height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:9px;
  font-size:18px;
  font-weight:900;
  color:#ffd84d;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#ffe45c,#ff8a00);
  color:#111;
  font-size:21px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 7px 0 #9b5200;
}

button:active{
  transform:translateY(4px);
  box-shadow:0 3px 0 #9b5200;
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.reset{
  margin-top:10px;
  background:linear-gradient(135deg,#e7e7e7,#9ca3af);
  box-shadow:0 7px 0 #555;
  font-size:17px;
}

.reset:active{
  box-shadow:0 3px 0 #555;
}

.loadingText{
  margin-top:8px;
  min-height:22px;
  color:#eee;
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>🎰 로또 추첨기</h1>
  <div class="desc">추첨 시작 버튼을 누르면 번호가 하나씩 추첨됩니다.</div>

  <div class="stage" id="stage">
    <div class="machine" id="machine"></div>
    <div class="exit"></div>
    <div class="rail"></div>
    <div class="resultTitle" id="resultTitle">당첨번호</div>
    <div class="result" id="result"></div>
  </div>

  <button id="startBtn" onclick="startDraw()">추첨 시작</button>
  <button class="reset" onclick="resetDraw()">다시 추첨하기</button>

  <div class="bonusBox" id="bonusBox"></div>
  <div class="loadingText" id="loadingText"></div>
</div>

<script>
const machine = document.getElementById("machine");
const stage = document.getElementById("stage");
const result = document.getElementById("result");
const bonusBox = document.getElementById("bonusBox");
const startBtn = document.getElementById("startBtn");
const loadingText = document.getElementById("loadingText");

let balls = [];
let mixer;

function ballColor(n){
  if(n <= 10) return "#fbc400";
  if(n <= 20) return "#69c8f2";
  if(n <= 30) return "#ff7272";
  if(n <= 40) return "#aaa";
  return "#b0d840";
}

function makeBalls(){
  machine.innerHTML = "";
  balls = [];

  for(let i=1;i<=45;i++){
    const b = document.createElement("div");
    b.className = "miniBall";
    b.innerText = i;
    b.style.background = ballColor(i);
    machine.appendChild(b);
    balls.push(b);
  }

  mixBalls();
}

function mixBalls(){
  balls.forEach(b=>{
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * 123;
    const x = 142 + Math.cos(angle) * radius;
    const y = 142 + Math.sin(angle) * radius;

    b.style.left = x + "px";
    b.style.top = y + "px";
    b.style.transform = `rotate(${Math.random()*900}deg)`;
  });
}

function intenseMix(){
  clearInterval(mixer);
  mixer = setInterval(mixBalls, 48);
}

function stopMix(){
  clearInterval(mixer);
}

function drawNumbers(){
  let arr = [];

  while(arr.length < 7){
    let n = Math.floor(Math.random()*45)+1;
    if(!arr.includes(n)) arr.push(n);
  }

  return {
    main: arr.slice(0,6).sort((a,b)=>a-b),
    bonus: arr[6]
  };
}

function wait(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

async function dropNumber(num, isBonus=false){
  loadingText.innerText = isBonus ? "보너스 번호 추첨 중..." : num + "번 공 추첨 중...";

  const d = document.createElement("div");
  d.className = "dropBall";
  d.innerText = num;
  d.style.background = ballColor(num);
  stage.appendChild(d);

  await wait(1150);
  d.remove();

  const p = document.createElement("div");
  p.className = "pick";
  p.innerText = num;
  p.style.background = ballColor(num);

  if(isBonus){
    bonusBox.innerHTML = "<span>보너스</span>";
    bonusBox.appendChild(p);
  }else{
    result.appendChild(p);
  }
}

async function startDraw(){
  startBtn.disabled = true;
  result.innerHTML = "";
  bonusBox.innerHTML = "";
  loadingText.innerText = "공을 섞는 중...";

  const picked = drawNumbers();

  intenseMix();
  await wait(1900);

  for(const n of picked.main){
    await dropNumber(n);
    await wait(350);
  }

  await wait(700);
  await dropNumber(picked.bonus, true);

  stopMix();
  loadingText.innerText = "추첨 완료";
  startBtn.disabled = false;
}

function resetDraw(){
  stopMix();
  result.innerHTML = "";
  bonusBox.innerHTML = "";
  loadingText.innerText = "";
  startBtn.disabled = false;
  makeBalls();
}

makeBalls();
</script>

</body>
</html>
